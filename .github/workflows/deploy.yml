name: Deploy

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  ACR_NAME: ${{ vars.ACR_NAME }}
  CONTAINER_APP_NAME: ${{ vars.CONTAINER_APP_NAME }}
  RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}

permissions:
  id-token: write
  contents: read

jobs:
  # Gate: only deploy if CI passed
  check-ci:
    name: Verify CI Passed
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - run: echo "CI passed, proceeding with deploy"

  # 1. Infrastructure first
  deploy-infra:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: check-ci
    environment: production
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -var-file=environments/dev.tfvars -out=tfplan
        env:
          TF_VAR_azure_ad_tenant_id: ${{ secrets.AZURE_AD_TENANT_ID }}
          TF_VAR_azure_ad_client_id: ${{ secrets.AZURE_AD_CLIENT_ID }}
          TF_VAR_db_admin_password: ${{ secrets.DB_ADMIN_PASSWORD }}

      - name: Terraform Apply
        run: terraform apply tfplan

  # 2. Backend deploy (after infra)
  build-and-deploy-backend:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest
    needs: deploy-infra
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build image
        working-directory: backend
        run: |
          IMAGE_TAG="${{ env.ACR_NAME }}.azurecr.io/rmp-api:${{ github.sha }}"
          docker build -t "$IMAGE_TAG" .

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.ACR_NAME }}.azurecr.io/rmp-api:${{ github.sha }}"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"

      - name: Push image
        working-directory: backend
        run: |
          IMAGE_TAG="${{ env.ACR_NAME }}.azurecr.io/rmp-api:${{ github.sha }}"
          docker push "$IMAGE_TAG"

      - name: Update Container App
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image "${{ env.ACR_NAME }}.azurecr.io/rmp-api:${{ github.sha }}"

  # 3. Frontend deploy (after infra, parallel with backend)
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-infra
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        working-directory: frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.API_BASE_URL }}
          VITE_AZURE_AD_CLIENT_ID: ${{ vars.AZURE_AD_CLIENT_ID }}
          VITE_AZURE_AD_AUTHORITY: ${{ vars.AZURE_AD_AUTHORITY }}
          VITE_AZURE_AD_REDIRECT_URI: ${{ vars.FRONTEND_URL }}
          VITE_API_SCOPE: ${{ vars.API_SCOPE }}

      - name: Deploy to Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          action: upload
          app_location: frontend
          output_location: dist
          skip_app_build: true
