# Azure Pipelines — Risk Manager Pro CI/CD
# Triggers on PRs and pushes to main

trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - docs/**
      - "*.md"

pr:
  branches:
    include:
      - main

variables:
  pythonVersion: "3.12"
  nodeVersion: "20.x"
  azureServiceConnection: "azure-rmp-connection"
  resourceGroup: "rg-rmp-dev"
  acrName: "acrrmpdev"
  containerAppName: "ca-rmp-dev-api"
  backendImage: "rmp-backend"

stages:
  # ──────────────────────────────────────────────
  # Infrastructure — Terraform
  # ──────────────────────────────────────────────
  - stage: Infrastructure
    displayName: "Infrastructure (Terraform)"
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: TerraformApply
        displayName: "Terraform Plan & Apply"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - task: TerraformInstaller@1
            displayName: "Install Terraform"
            inputs:
              terraformVersion: "latest"

          - task: TerraformTaskV4@4
            displayName: "Terraform Init"
            inputs:
              provider: "azurerm"
              command: "init"
              workingDirectory: "$(System.DefaultWorkingDirectory)/infra"
              backendServiceArm: $(azureServiceConnection)
              backendAzureRmResourceGroupName: "rmp-terraform-state"
              backendAzureRmStorageAccountName: "rmptfstate"
              backendAzureRmContainerName: "tfstate"
              backendAzureRmKey: "riskmanagerpro.terraform.tfstate"

          - task: TerraformTaskV4@4
            displayName: "Terraform Plan"
            inputs:
              provider: "azurerm"
              command: "plan"
              workingDirectory: "$(System.DefaultWorkingDirectory)/infra"
              commandOptions: >-
                -var-file=environments/dev.tfvars
                -var="azure_ad_tenant_id=$(AZURE_AD_TENANT_ID)"
                -var="azure_ad_client_id=$(AZURE_AD_CLIENT_ID)"
                -var="db_admin_password=$(DB_ADMIN_PASSWORD)"
              environmentServiceNameAzureRM: $(azureServiceConnection)

          - task: TerraformTaskV4@4
            displayName: "Terraform Apply"
            inputs:
              provider: "azurerm"
              command: "apply"
              workingDirectory: "$(System.DefaultWorkingDirectory)/infra"
              commandOptions: >-
                -var-file=environments/dev.tfvars
                -var="azure_ad_tenant_id=$(AZURE_AD_TENANT_ID)"
                -var="azure_ad_client_id=$(AZURE_AD_CLIENT_ID)"
                -var="db_admin_password=$(DB_ADMIN_PASSWORD)"
              environmentServiceNameAzureRM: $(azureServiceConnection)

  # ──────────────────────────────────────────────
  # Backend — Python FastAPI
  # ──────────────────────────────────────────────
  - stage: Backend
    displayName: "Backend CI"
    dependsOn: [] # Run in parallel with Infrastructure
    jobs:
      - job: LintAndTypeCheck
        displayName: "Lint & Type Check"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: $(pythonVersion)

          - script: |
              cd backend
              pip install --upgrade pip
              pip install -e ".[dev]"
            displayName: "Install dependencies"

          - script: |
              cd backend
              ruff check app/ tests/
            displayName: "Ruff lint"

          - script: |
              cd backend
              ruff format --check app/ tests/
            displayName: "Ruff format check"

          - script: |
              cd backend
              mypy app/
            displayName: "Mypy type check"

      - job: Test
        displayName: "Unit Tests"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: $(pythonVersion)

          - script: |
              cd backend
              pip install --upgrade pip
              pip install -e ".[dev]"
            displayName: "Install dependencies"

          - script: |
              cd backend
              pytest tests/ \
                --cov=app \
                --cov-report=xml:coverage.xml \
                --cov-report=term-missing \
                --junitxml=test-results.xml
            displayName: "Run tests"

          - task: PublishTestResults@2
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: "JUnit"
              testResultsFiles: "backend/test-results.xml"
              testRunTitle: "Backend Tests"

          - task: PublishCodeCoverageResults@2
            condition: succeededOrFailed()
            inputs:
              summaryFileLocation: "backend/coverage.xml"

      - job: DockerBuildAndPush
        displayName: "Docker Build & Push"
        dependsOn:
          - LintAndTypeCheck
          - Test
        condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - task: AzureCLI@2
            displayName: "Build & push to ACR"
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az acr login --name $(acrName)
                cd backend
                docker build -t $(acrName).azurecr.io/$(backendImage):$(Build.BuildId) -t $(acrName).azurecr.io/$(backendImage):latest .
                docker push $(acrName).azurecr.io/$(backendImage):$(Build.BuildId)
                docker push $(acrName).azurecr.io/$(backendImage):latest

  # ──────────────────────────────────────────────
  # Frontend — React + TypeScript
  # ──────────────────────────────────────────────
  - stage: Frontend
    displayName: "Frontend CI"
    dependsOn: [] # Run in parallel with Backend
    jobs:
      - job: LintAndTypeCheck
        displayName: "Lint & Type Check"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(nodeVersion)

          - script: |
              cd frontend
              npm ci
            displayName: "Install dependencies"

          - script: |
              cd frontend
              npm run lint
            displayName: "ESLint"

          - script: |
              cd frontend
              npm run type-check
            displayName: "TypeScript type check"

      - job: Build
        displayName: "Build"
        dependsOn: LintAndTypeCheck
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(nodeVersion)

          - script: |
              cd frontend
              npm ci
            displayName: "Install dependencies"

          - script: |
              cd frontend
              npm run build
            displayName: "Build production bundle"

          - publish: frontend/dist
            artifact: frontend-build
            displayName: "Publish build artifact"

  # ──────────────────────────────────────────────
  # Deploy — Push to Azure
  # ──────────────────────────────────────────────
  - stage: Deploy
    displayName: "Deploy to Azure"
    dependsOn:
      - Infrastructure
      - Backend
      - Frontend
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: DeployBackend
        displayName: "Deploy Backend (Container App)"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - task: AzureCLI@2
            displayName: "Update Container App image"
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az containerapp update \
                  --name $(containerAppName) \
                  --resource-group $(resourceGroup) \
                  --image $(acrName).azurecr.io/$(backendImage):$(Build.BuildId)

          - task: AzureCLI@2
            displayName: "Run database migrations"
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az containerapp exec \
                  --name $(containerAppName) \
                  --resource-group $(resourceGroup) \
                  --command "python -m alembic upgrade head" || echo "Migration exec not available — run manually if needed"

      - job: DeployFrontend
        displayName: "Deploy Frontend (Static Web App)"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - download: current
            artifact: frontend-build
            displayName: "Download frontend build"

          - task: AzureStaticWebApp@0
            displayName: "Deploy to Azure Static Web App"
            inputs:
              workingDirectory: $(Pipeline.Workspace)/frontend-build
              app_location: "."
              skip_app_build: true
              skip_api_build: true
              azure_static_web_apps_api_token: $(SWA_DEPLOYMENT_TOKEN)
