# Azure Pipelines — Risk Manager Pro CI/CD
# Triggers on PRs and pushes to main

trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - docs/**
      - "*.md"

pr:
  branches:
    include:
      - main

variables:
  - group: "RMP variable group"
  - name: pythonVersion
    value: "3.12"
  - name: nodeVersion
    value: "20.x"
  - name: azureServiceConnection
    value: "azure-rmp-connection"
  - name: resourceGroup
    value: "rg-rmp-rmp-start"
  - name: acrName
    value: "acrrmprmpstart"
  - name: containerAppName
    value: "ca-rmp-rmp-start-api"
  - name: backendImage
    value: "risk-manager-pro/api-rmp-start"

stages:
  # ──────────────────────────────────────────────
  # Infrastructure — Terraform
  # ──────────────────────────────────────────────
  - stage: Infrastructure
    displayName: "Infrastructure (Terraform) — SKIPPED"
    condition: "false"  # Disabled: deploying to existing rg-rmp-rmp-start resources
    jobs:
      - job: TerraformApply
        displayName: "Terraform Plan & Apply"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - task: TerraformInstaller@1
            displayName: "Install Terraform"
            inputs:
              terraformVersion: "latest"

          - task: TerraformTaskV4@4
            displayName: "Terraform Init"
            inputs:
              provider: "azurerm"
              command: "init"
              workingDirectory: "$(System.DefaultWorkingDirectory)/infra"
              backendServiceArm: $(azureServiceConnection)
              backendAzureRmResourceGroupName: "rmp-terraform-state"
              backendAzureRmStorageAccountName: "rmpfgllctfstate"
              backendAzureRmContainerName: "tfstate"
              backendAzureRmKey: "riskmanagerpro.terraform.tfstate"

          - task: TerraformTaskV4@4
            displayName: "Terraform Plan"
            inputs:
              provider: "azurerm"
              command: "plan"
              workingDirectory: "$(System.DefaultWorkingDirectory)/infra"
              commandOptions: >-
                -var-file=environments/dev.tfvars
                -var="azure_ad_tenant_id=$(AZURE_AD_TENANT_ID)"
                -var="azure_ad_client_id=$(AZURE_AD_CLIENT_ID)"
                -var="db_admin_password=$(DB_ADMIN_PASSWORD)"
              environmentServiceNameAzureRM: $(azureServiceConnection)

          - task: TerraformTaskV4@4
            displayName: "Terraform Apply"
            inputs:
              provider: "azurerm"
              command: "apply"
              workingDirectory: "$(System.DefaultWorkingDirectory)/infra"
              commandOptions: >-
                -var-file=environments/dev.tfvars
                -var="azure_ad_tenant_id=$(AZURE_AD_TENANT_ID)"
                -var="azure_ad_client_id=$(AZURE_AD_CLIENT_ID)"
                -var="db_admin_password=$(DB_ADMIN_PASSWORD)"
              environmentServiceNameAzureRM: $(azureServiceConnection)

  # ──────────────────────────────────────────────
  # Backend — Python FastAPI
  # ──────────────────────────────────────────────
  - stage: Backend
    displayName: "Backend CI"
    dependsOn: [] # Run in parallel with Infrastructure
    jobs:
      - job: LintAndTypeCheck
        displayName: "Lint & Type Check"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: $(pythonVersion)

          - script: |
              cd backend
              pip install --upgrade pip
              pip install -e ".[dev]"
            displayName: "Install dependencies"

          - script: |
              cd backend
              ruff check app/ tests/
            displayName: "Ruff lint"

          - script: |
              cd backend
              ruff format --check app/ tests/
            displayName: "Ruff format check"

          - script: |
              cd backend
              mypy app/
            displayName: "Mypy type check"

      - job: Test
        displayName: "Unit Tests"
        pool:
          vmImage: "ubuntu-latest"
        services:
          postgres:
            image: postgres:16
            ports:
              - 5432:5432
            env:
              POSTGRES_USER: rmp_test
              POSTGRES_PASSWORD: rmp_test_password
              POSTGRES_DB: riskmanagerpro_test
        variables:
          DATABASE_URL: "postgresql+asyncpg://rmp_test:rmp_test_password@localhost:5432/riskmanagerpro_test"
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: $(pythonVersion)

          - script: |
              cd backend
              pip install --upgrade pip
              pip install -e ".[dev]"
            displayName: "Install dependencies"

          - script: |
              cd backend
              pytest tests/ \
                --tb=short \
                --cov=app \
                --cov-report=xml:coverage.xml \
                --cov-report=term-missing \
                --junitxml=test-results.xml
            displayName: "Run tests"
            env:
              DATABASE_URL: $(DATABASE_URL)

          - task: PublishTestResults@2
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: "JUnit"
              testResultsFiles: "backend/test-results.xml"
              testRunTitle: "Backend Tests"

          - task: PublishCodeCoverageResults@2
            condition: succeededOrFailed()
            inputs:
              summaryFileLocation: "backend/coverage.xml"

      - job: DockerBuildAndPush
        displayName: "Docker Build & Push"
        dependsOn:
          - LintAndTypeCheck
          - Test
        condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - task: AzureCLI@2
            displayName: "Build & push to ACR"
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az acr login --name $(acrName)
                cd backend
                docker build -t $(acrName).azurecr.io/$(backendImage):$(Build.BuildId) -t $(acrName).azurecr.io/$(backendImage):latest .
                docker push $(acrName).azurecr.io/$(backendImage):$(Build.BuildId)
                docker push $(acrName).azurecr.io/$(backendImage):latest

  # ──────────────────────────────────────────────
  # Frontend — React + TypeScript
  # ──────────────────────────────────────────────
  - stage: Frontend
    displayName: "Frontend CI"
    dependsOn: [] # Run in parallel with Backend
    jobs:
      - job: LintAndTypeCheck
        displayName: "Lint & Type Check"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(nodeVersion)

          - script: |
              cd frontend
              npm ci
            displayName: "Install dependencies"

          - script: |
              cd frontend
              npm run lint
            displayName: "ESLint"

          - script: |
              cd frontend
              npm run type-check
            displayName: "TypeScript type check"

      - job: Build
        displayName: "Build"
        dependsOn: LintAndTypeCheck
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(nodeVersion)

          - script: |
              cd frontend
              npm ci
            displayName: "Install dependencies"

          - script: |
              echo "VITE_AZURE_AD_CLIENT_ID=$VITE_AZURE_AD_CLIENT_ID"
              echo "VITE_AZURE_AD_AUTHORITY=$VITE_AZURE_AD_AUTHORITY"
              cd frontend
              npm run build
            displayName: "Build production bundle"
            env:
              VITE_AZURE_AD_CLIENT_ID: $(AZURE_AD_CLIENT_ID)
              VITE_AZURE_AD_AUTHORITY: https://login.microsoftonline.com/$(AZURE_AD_TENANT_ID)
              VITE_AZURE_AD_REDIRECT_URI: $(FRONTEND_URL)
              VITE_API_BASE_URL: $(API_BASE_URL)
              VITE_API_SCOPE: api://$(AZURE_AD_CLIENT_ID)/access_as_user

          - publish: frontend/dist
            artifact: frontend-build
            displayName: "Publish build artifact"

  # ──────────────────────────────────────────────
  # Deploy — Push to Azure
  # ──────────────────────────────────────────────
  - stage: Deploy
    displayName: "Deploy to Azure"
    dependsOn:
      - Frontend
    condition: and(succeeded('Frontend'), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: DeployBackend
        displayName: "Deploy Backend (Container App)"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - task: AzureCLI@2
            displayName: "Update Container App image"
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az containerapp update \
                  --name $(containerAppName) \
                  --resource-group $(resourceGroup) \
                  --image $(acrName).azurecr.io/$(backendImage):$(Build.BuildId)

          - task: AzureCLI@2
            displayName: "Run database migrations"
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az containerapp exec \
                  --name $(containerAppName) \
                  --resource-group $(resourceGroup) \
                  --command "python -m alembic upgrade head" || echo "Migration exec not available — run manually if needed"

      - job: DeployFrontend
        displayName: "Deploy Frontend (Static Web App)"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - download: current
            artifact: frontend-build
            displayName: "Download frontend build"

          - task: AzureCLI@2
            displayName: "Deploy to Azure Static Web App"
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                npm install -g @azure/static-web-apps-cli
                swa deploy $(Pipeline.Workspace)/frontend-build \
                  --deployment-token "$SWA_TOKEN" \
                  --env production
            env:
              SWA_TOKEN: $(SWA_DEPLOYMENT_TOKEN)
